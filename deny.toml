# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = false
no-default-features = false

[advisories]
ignore = [
    # bincode: unmaintained, transitive dep via pdf-extract
    { id = "RUSTSEC-2025-0141", reason = "transitive dep via pdf-extract, no direct usage" },
    # yaml-rust: unmaintained, transitive dep via syntect
    { id = "RUSTSEC-2024-0320", reason = "transitive dep via syntect, no direct usage" },
    # rustls-webpki: transitive dep via rmcp → reqwest → rustls
    { id = "RUSTSEC-2026-0049", reason = "transitive dep via rmcp, awaiting upstream fix" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "BSL-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
